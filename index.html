<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZUODI 佐迪智能家具 | 办公空间解决方案专家</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://zuodii.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;700;800&display=swap">
    <link rel="stylesheet" href="./assets/index-Cg7oX_Ag.css">
    <link rel="stylesheet" href="./assets/mobile_patch.css">
    <script>
        // 应用配置
        window.zuodii_appId = "zuodii-prod";
        
        // 增强错误处理
        window.addEventListener('error', function(e) {
            console.error('[全局错误]', e.message, 'at', e.filename, ':', e.lineno);
            document.getElementById('error-display').innerHTML += 
                '<div style="color:red; margin:5px; padding:5px; border:1px solid red;">' +
                '错误: ' + e.message + ' at ' + (e.filename || '未知文件') + ':' + e.lineno +
                '</div>';
        });
        
        window.addEventListener('unhandledrejection', function(e) {
            console.error('[未处理的Promise拒绝]', e.reason);
            document.getElementById('error-display').innerHTML += 
                '<div style="color:orange; margin:5px; padding:5px; border:1px solid orange;">' +
                'Promise拒绝: ' + (e.reason?.message || e.reason) +
                '</div>';
        });
        
        // 脚本加载监控
        let scriptsLoaded = 0;
        const totalScripts = 3;
        
        function checkScriptLoad() {
            scriptsLoaded++;
            console.log(`脚本加载进度: ${scriptsLoaded}/${totalScripts}`);
            document.getElementById('loading-status').textContent = 
                `加载中... (${scriptsLoaded}/${totalScripts})`;
            
            if (scriptsLoaded === totalScripts) {
                console.log('所有脚本加载完成，等待 React 渲染...');
                document.getElementById('loading-status').textContent = '脚本加载完成，等待渲染...';
                
                // 检查 React 是否加载
                setTimeout(() => {
                    if (window.React) {
                        console.log('React 已加载，版本:', window.React.version);
                        document.getElementById('loading-status').textContent = 
                            'React 已加载 v' + window.React.version;
                    } else {
                        console.error('React 未加载');
                        document.getElementById('loading-status').textContent = 
                            '错误: React 未加载';
                        document.getElementById('error-display').innerHTML += 
                            '<div style="color:red; margin:5px; padding:5px; border:1px solid red;">' +
                            '严重: React 库未加载，应用无法启动' +
                            '</div>';
                    }
                }, 2000);
            }
        }
        
        // 监控脚本加载
        document.addEventListener('DOMContentLoaded', function() {
            const scripts = document.querySelectorAll('script[type="module"]');
            scripts.forEach(script => {
                const originalOnLoad = script.onload;
                const originalOnError = script.onerror;
                
                script.onload = function(e) {
                    console.log('脚本加载成功:', script.src);
                    checkScriptLoad();
                    if (originalOnLoad) originalOnLoad.call(this, e);
                };
                
                script.onerror = function(e) {
                    console.error('脚本加载失败:', script.src);
                    document.getElementById('error-display').innerHTML += 
                        '<div style="color:red; margin:5px; padding:5px; border:1px solid red;">' +
                        '脚本加载失败: ' + script.src +
                        '</div>';
                    checkScriptLoad();
                    if (originalOnError) originalOnError.call(this, e);
                };
            });
        });
    </script>
    <style>
        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        
        #loading-status {
            font-size: 18px;
            margin: 20px;
            color: #333;
        }
        
        #error-display {
            max-width: 800px;
            max-height: 300px;
            overflow-y: auto;
            margin: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            background: #f9f9f9;
            font-size: 12px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* 隐藏调试信息（生产环境可移除） */
        @media (min-width: 768px) {
            #error-display {
                position: fixed;
                bottom: 10px;
                right: 10px;
                width: 400px;
                z-index: 10000;
            }
        }
    </style>
</head>
<body>
    <!-- 加载覆盖层 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-status">初始化中...</div>
        <div id="error-display"></div>
        <div style="margin-top: 20px; font-size: 14px; color: #666;">
            如果长时间停留在此页面，请检查浏览器控制台 (F12) 查看错误信息
        </div>
    </div>
    
    <!-- 主应用容器 -->
    <div id="root"></div>
    
    <!-- 无 JavaScript 回退 -->
    <noscript>
        <div style="text-align:center; padding:50px;">
            <h1>佐迪智能家具</h1>
            <p>请开启 JavaScript 以访问完整功能。</p>
        </div>
    </noscript>

    <!-- 应用脚本 -->
    <script type="module" src="./assets/index-T7eFSBbb.js"></script>
    <script type="module" src="./assets/vendor-CANcgsl4.js"></script>
    <script type="module" src="./assets/ui-DbSFp3oG.js"></script>
    
    <script>
        // 页面加载完成后隐藏加载覆盖层
        window.addEventListener('load', function() {
            // 检查应用是否渲染
            setTimeout(function() {
                const root = document.getElementById('root');
                if (root && root.innerHTML && root.innerHTML.trim().length > 100) {
                    console.log('应用已渲染，隐藏加载层');
                    document.getElementById('loading-overlay').style.display = 'none';
                } else {
                    console.warn('应用未渲染，保持加载层显示');
                    document.getElementById('loading-status').textContent = 
                        '应用加载超时。请检查控制台错误。';
                    
                    // 提供手动继续选项
                    const continueBtn = document.createElement('button');
                    continueBtn.textContent = '继续访问网站';
                    continueBtn.style.margin = '10px';
                    continueBtn.style.padding = '10px 20px';
                    continueBtn.style.background = '#3498db';
                    continueBtn.style.color = 'white';
                    continueBtn.style.border = 'none';
                    continueBtn.style.borderRadius = '4px';
                    continueBtn.style.cursor = 'pointer';
                    continueBtn.onclick = function() {
                        document.getElementById('loading-overlay').style.display = 'none';
                    };
                    
                    document.getElementById('loading-overlay').appendChild(continueBtn);
                }
            }, 5000); // 等待5秒
        });
    </script>
</body>
</html>
