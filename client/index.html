<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="佐迪智能家具 - 专业的办公家具和学校家具解决方案提供商" />
    <meta name="keywords" content="办公家具,学校家具,课桌椅,办公椅,智能家具" />
    <meta name="theme-color" content="#1A1A1A" />
    
    <!-- 性能优化 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    
    <!-- 关键资源预加载 -->
    <link rel="preload" as="image" href="/images/hero-office.webp" />
    <link rel="preload" as="image" href="/images/hero-school.webp" />
    
    <title>办公家具·学校家具展示平台</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;700;800&family=Archivo+Black&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- 性能监测 -->
    <script>
      if (window.performance && window.performance.timing) {
        window.addEventListener('load', function() {
          const perfData = window.performance.timing;
          const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
          console.log('页面加载时间: ' + pageLoadTime + 'ms');
        });
      }
    </script>
    
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
